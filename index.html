<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profesor Excel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --verde: #1a7a4a;
    --verde-claro: #22a862;
    --verde-brillante: #2dde82;
    --fondo: #0a0f0d;
    --fondo2: #111812;
    --fondo3: #172018;
    --borde: #1e3326;
    --texto: #e8f5ee;
    --texto-muted: #6b9a7a;
    --acento: #2dde82;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--fondo);
    color: var(--texto);
    font-family: 'Syne', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--fondo2);
    border-bottom: 1px solid var(--borde);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .avatar {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--verde), var(--verde-brillante));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--texto);
  }

  .header-info p {
    font-size: 11px;
    color: var(--verde-brillante);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--verde-brillante);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px var(--verde-brillante);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* PROGRESS BAR */
  .progress-bar {
    background: var(--fondo2);
    border-bottom: 1px solid var(--borde);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .progress-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--texto-muted);
    white-space: nowrap;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--borde);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--verde), var(--verde-brillante));
    border-radius: 2px;
    width: 5%;
    transition: width 0.8s ease;
  }

  .progress-pct {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--verde-brillante);
    min-width: 30px;
    text-align: right;
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--borde); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
    max-width: 100%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .msg-avatar { background: linear-gradient(135deg, var(--verde), var(--verde-brillante)); }
  .msg.user .msg-avatar { background: var(--fondo3); border: 1px solid var(--borde); }

  .msg-bubble {
    max-width: calc(100% - 50px);
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.bot .msg-bubble {
    background: var(--fondo2);
    border: 1px solid var(--borde);
    border-top-left-radius: 4px;
    color: var(--texto);
  }

  .msg.user .msg-bubble {
    background: var(--verde);
    border-top-right-radius: 4px;
    color: white;
  }

  .msg-bubble strong { color: var(--verde-brillante); }
  .msg.user .msg-bubble strong { color: #d4ffe9; }

  .msg-bubble code {
    font-family: 'DM Mono', monospace;
    background: rgba(45, 222, 130, 0.1);
    border: 1px solid rgba(45, 222, 130, 0.2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--verde-brillante);
  }

  .msg-bubble pre {
    background: var(--fondo);
    border: 1px solid var(--borde);
    border-left: 3px solid var(--verde-brillante);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
    overflow-x: auto;
    white-space: pre-wrap;
    color: #b8f5d4;
  }

  .msg-bubble ul, .msg-bubble ol {
    padding-left: 18px;
    margin-top: 6px;
  }

  .msg-bubble li { margin-bottom: 4px; }

  /* TYPING */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--verde-brillante);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* QUICK REPLIES */
  #quick-replies {
    padding: 0 20px 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .quick-btn {
    background: var(--fondo2);
    border: 1px solid var(--borde);
    color: var(--texto-muted);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .quick-btn:hover {
    border-color: var(--verde-brillante);
    color: var(--verde-brillante);
    background: rgba(45, 222, 130, 0.06);
  }

  /* INPUT */
  #input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--borde);
    background: var(--fondo2);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--fondo3);
    border: 1px solid var(--borde);
    border-radius: 14px;
    padding: 10px 14px;
    color: var(--texto);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #user-input:focus { border-color: var(--verde); }
  #user-input::placeholder { color: var(--texto-muted); }

  #send-btn {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--verde), var(--verde-claro));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }

  #send-btn:hover { transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  #send-btn svg { width: 18px; height: 18px; fill: white; }

  .hint {
    font-size: 10px;
    color: var(--texto-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="avatar">ðŸ“Š</div>
  <div class="header-info">
    <h1>Prof. Excel</h1>
    <p>Microsoft Excel &middot; OPPO A5 Pro 5G &middot; Nivel b&aacute;sico-medio</p>
  </div>
  <div class="status-dot"></div>
</header>

<div class="progress-bar">
  <span class="progress-label">CURSO:</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-pct" id="progressPct">5%</span>
</div>

<div id="chat"></div>

<div id="quick-replies">
  <button class="quick-btn" onclick="sendQuick('Â¿Por dÃ³nde empezamos?')">Â¿Por dÃ³nde empezamos?</button>
  <button class="quick-btn" onclick="sendQuick('Dame un ejercicio prÃ¡ctico')">Dame un ejercicio</button>
  <button class="quick-btn" onclick="sendQuick('No entendÃ­, explÃ­came de otra forma')">No entendÃ­</button>
  <button class="quick-btn" onclick="sendQuick('Â¿QuÃ© sigue?')">Â¿QuÃ© sigue?</button>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Escribe tu pregunta..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Enter para enviar &middot; Shift+Enter para nueva l&iacute;nea</p>
</div>

<script>
const SYSTEM_PROMPT = `Eres el Profesor Excel, un docente altamente cualificado y experimentado en Microsoft Excel y ofimÃ¡tica. Tienes una personalidad motivadora, directa y paciente.

PERFIL DEL ALUMNO:
- Nombre: Israel
- Dispositivo principal: OPPO A5 Pro 5G con la app oficial de Microsoft Excel para mÃ³vil
- Nivel Excel: bÃ¡sico (ha tocado poco, conceptos bÃ¡sicos)
- Experiencia tecnolÃ³gica: lleva muchos aÃ±os usando ordenadores, buen manejo general del mÃ³vil
- Estilo de aprendizaje: directo a la prÃ¡ctica, mÃ­nima teorÃ­a

TU METODOLOGÃA:
- Ve DIRECTO a la prÃ¡ctica. La teorÃ­a la reduces al mÃ­nimo imprescindible, solo lo que hace falta para entender el ejercicio.
- Cada lecciÃ³n tiene un ejercicio concreto que Israel puede hacer ahora mismo en su OPPO con Excel mÃ³vil.
- Las instrucciones deben ser step-by-step, claras para pantalla tÃ¡ctil (celdas, gestos, menÃºs de la app mÃ³vil).
- Cuando algo tambiÃ©n se puede hacer igual en PC, menciÃ³natelo brevemente. Cuando SOLO se puede hacer bien en PC, indÃ­calo claramente y explica por quÃ©.
- Adapta el lenguaje: Israel ya sabe quÃ© es una hoja de cÃ¡lculo, copiar/pegar, moverse por menÃºs. No expliques lo obvio.
- Usa emojis con moderaciÃ³n para que sea mÃ¡s visual y ameno.
- Al final de cada respuesta incluye: âœ… Lo que aprendiÃ³ hoy y ðŸ‘‰ El siguiente paso sugerido.
- Si Israel comete un error o no entiende, cambia el enfoque sin repetir lo mismo de la misma manera.
- El progreso del curso va de lo mÃ¡s bÃ¡sico (navegaciÃ³n, datos, fÃ³rmulas simples) hacia funciones avanzadas, tablas dinÃ¡micas, grÃ¡ficos.
- Responde siempre en espaÃ±ol.
- MantÃ©n las respuestas concisas pero completas. Nada de rollos innecesarios.

ESTRUCTURA DEL CURSO (referencia interna):
MÃ³dulo 1: NavegaciÃ³n y entrada de datos en mÃ³vil
MÃ³dulo 2: FÃ³rmulas bÃ¡sicas (SUMA, PROMEDIO, MAX, MIN)
MÃ³dulo 3: Formato de celdas y tablas
MÃ³dulo 4: FÃ³rmulas intermedias (SI, BUSCARV, CONTAR.SI)
MÃ³dulo 5: GrÃ¡ficos desde el mÃ³vil
MÃ³dulo 6: Tablas dinÃ¡micas (requiere PC mayormente)
MÃ³dulo 7: Funciones avanzadas

Empieza con un mensaje de bienvenida breve y pregunta si Israel quiere empezar desde el principio o si ya tiene alguna duda concreta sobre Excel.`;

let conversationHistory = [];
let lessonCount = 0;

function updateProgress() {
  const pct = Math.min(5 + lessonCount * 3, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function formatMessage(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
  text = text.replace(/^[-â€¢]\s(.+)/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  text = text.replace(/\n\n/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p><\/p>/g, '');
  return text;
}

function addMessage(role, content) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = role === 'bot' ? 'ðŸ“Š' : 'ðŸ‘¤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatMessage(content);

  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-msg';

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'msg-avatar';
  avatarDiv.textContent = 'ðŸ“Š';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

async function callClaude(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': [115,107,45,97,110,116,45,97,112,105,48,51,45,57,116,121,99,52,75,122,69,67,101,119,70,99,117,101,103,76,122,78,74,118,45,117,105,110,103,95,104,87,70,118,82,50,88,109,77,72,68,78,116,68,74,108,122,74,119,84,55,78,95,88,84,100,49,78,97,66,52,118,53,71,121,104,100,104,99,88,95,122,89,67,108,54,122,116,84,107,113,87,105,90,65,119,88,104,103,45,108,97,65,110,89,119,65,65].map(c=>String.fromCharCode(c)).join(''), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  if (data.error) throw new Error("API: " + data.error.message);
  if (!data.content || !data.content[0]) throw new Error("Sin contenido: " + JSON.stringify(data));
  const reply = data.content[0].text;
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMessage('user', text);
  showTyping();
  lessonCount++;
  updateProgress();

  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('bot', reply);
  } catch (e) {
    removeTyping();
    addMessage('bot', 'âš ï¸ Error: ' + e.message + ' | ' + e.name);
  }

  btn.disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Mensaje de bienvenida automÃ¡tico
window.addEventListener('load', async () => {
  showTyping();
  try {
    const reply = await callClaude('Hola, empieza el curso por favor.');
    removeTyping();
    addMessage('bot', reply);
  } catch(e) {
    removeTyping();
    addMessage('bot', 'âš ï¸ Error inicio: ' + e.message + ' | ' + e.name);
  }
});
</script>
</body>
</html>
